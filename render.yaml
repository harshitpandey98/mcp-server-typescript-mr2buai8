services:
  - type: web
    name: my-mcp-server
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: MCP_API_TOKEN
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
